    cs: {
      label: 'CS',
      results: [
        {

          cls: 'red',

          recommend: '<strong>📌 추천 콘텐츠</strong>"병원 CS, 매뉴얼 없이는 안 되는 이유" — 메디하우스 NEXT에서 확인하세요.',
        },
        {
          max: 14,
          cls: 'orange',
          icon: '⚠️',

          recommend: '<strong>📌 추천 콘텐츠</strong>"재방문율을 높이는 병원 CS의 작은 차이" — 메디하우스 NEXT에서 확인하세요.',
        },
        {
          max: 20,
          cls: 'green',
          icon: '✅',
          title: 'CS 체계 양호',
          desc: '응대 기준과 절차가 전반적으로 잘 잡혀 있는 상태입니다. 이제는 데이터 기반으로 재방문율과 환자 만족도를 끌어올릴 차례입니다.',
          recommend: '<strong>📌 추천 콘텐츠</strong>"좋은 CS가 매출로 연결되는 구조" — 메디하우스 NEXT에서 확인하세요.',
        },
      ],
    },
  };

  function toggleCheck(el) {
    const idx = el.dataset.idx;
    const set = checkedByTab[currentTab];

    if (set.has(idx)) {
      set.delete(idx);
      el.classList.remove('checked');
    } else {
      set.add(idx);
      el.classList.add('checked');

      el.style.transform = 'scale(1.01)';
      setTimeout(() => {
        el.style.transform = '';
      }, 150);
    }

    updateProgress();
  }

  function updateProgress() {
    const count = checkedByTab[currentTab].size;

    document.getElementById('checked-count').textContent = count;
    document.getElementById('checked-total').textContent = 20;
    document.getElementById('progress-fill').style.width = (count / 20 * 100) + '%';

    const btn = document.getElementById('result-btn');

    if (count > 0) {
      btn.disabled = false;
      btn.textContent = `결과 확인하기 (${count}개 선택) →`;
    } else {
      btn.disabled = true;
      btn.textContent = '결과 확인하기 →';
    }

    const panel = document.getElementById('result-panel');
    if (panel.classList.contains('show')) {
      panel.classList.remove('show');
    }
  }

  function getCheckedItems() {
    return Array.from(
      document.querySelectorAll(`#check-${currentTab} .check-item.checked .check-label`)
    ).map(el => el.textContent.trim());
  }

  function saveResultToGoogleSheet(payload) {
    if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL.includes('여기에_Apps_Script')) {
      console.warn('GOOGLE_SCRIPT_URL이 아직 입력되지 않았습니다.');
      return;
    }

    fetch(GOOGLE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {
        'Content-Type': 'text/plain;charset=utf-8'
      },
      body: JSON.stringify(payload)
    }).catch(error => {
      console.log('Google Sheet 저장 실패:', error);
    });
  }

  function showResult() {
    const score = checkedByTab[currentTab].size;
    const panel = document.getElementById('result-panel');
    const meta = tabMeta[currentTab];

    if (score === 0) {
      return;
    }

    const tier = meta.results.find(r => score <= r.max);

    let rangeLabel;
    if (tier.max === 7) {
      rangeLabel = '0~7개 구간';
    } else if (tier.max === 14) {
      rangeLabel = '8~14개 구간';
    } else {
      rangeLabel = '15~20개 구간';
    }

    panel.className = `result-panel ${tier.cls} show`;
    document.getElementById('result-icon').textContent = tier.icon;
    document.getElementById('result-score-label').textContent = `[${meta.label}] ${score}개 체크 — ${rangeLabel}`;
    document.getElementById('result-title').textContent = tier.title;
    document.getElementById('result-desc').textContent = tier.desc;
    document.getElementById('result-recommend').innerHTML = tier.recommend;

    const checkedItems = getCheckedItems();

    const payload = {
      category: meta.label,
      score: score,
      rangeLabel: rangeLabel,
      resultTitle: tier.title,
      checkedItems: checkedItems,
      pageUrl: window.location.href,
      userAgent: navigator.userAgent
    };

    saveResultToGoogleSheet(payload);

    setTimeout(() => {
      panel.scrollIntoView({
        behavior: 'smooth',
        block: 'center'
      });
    }, 100);
  }

  // ── Checklist Tab Switch ──
  function switchCheckTab(type) {
    currentTab = type;

    document.querySelectorAll('.check-tab').forEach((t, i) => {
      const order = ['marketing', 'design', 'cs'];
      t.classList.toggle('active', order[i] === type);
    });

    document.getElementById('check-marketing').classList.toggle('active', type === 'marketing');
    document.getElementById('check-design').classList.toggle('active', type === 'design');
    document.getElementById('check-cs').classList.toggle('active', type === 'cs');

    updateProgress();

    const panel = document.getElementById('result-panel');
    panel.classList.remove('show');
  }

  // ── Package Tab Switch ──
  function switchPkg(type) {
    document.querySelectorAll('.pkg-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && type === 'marketing') || (i === 1 && type === 'design'));
    });

    document.getElementById('pkg-marketing').classList.toggle('active', type === 'marketing');
    document.getElementById('pkg-design').classList.toggle('active', type === 'design');
  }

  // ── Scroll Fade In ──
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((e, i) => {
      if (e.isIntersecting) {
        setTimeout(() => {
          e.target.classList.add('visible');
        }, i * 80);

        observer.unobserve(e.target);
      }
    });
  }, {
    threshold: 0.1
  });

  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
</script>
